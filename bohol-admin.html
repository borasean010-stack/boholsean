<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="boholsean-logo.png">
    <link rel="apple-touch-icon" href="boholsean-logo.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 센터 - Bohol Sean</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="admin.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* 🚀 명령하신 메인 레이아웃 전용 스타일 (5분할 한줄 배치) */
        .main-tool-grid { display: grid; grid-template-columns: repeat(4, 1fr) 0.7fr; gap: 10px; margin-bottom: 25px; }
        .tool-box { background: #fff; border-radius: 12px; padding: 15px 10px; border-top: 5px solid #00b48a; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; cursor: pointer; transition: transform 0.2s; }
        .tool-box:hover { transform: translateY(-3px); }
        .tool-box.active { background: #fffaf5; border-color: #00b48a; box-shadow: 0 0 15px rgba(0, 180, 138, 0.2); transform: translateY(-3px); }
        .tool-box.active h4 { color: #00b48a; font-weight: 800; }
        .tool-box h4 { margin: 0; font-size: 13px; color: #666; font-weight: 600; white-space: nowrap; }
        .tool-box .date-val { margin-top: 8px; font-size: 16px; font-weight: 800; color: #333; }
        .tool-box.system-box { border-top-color: #00c73c; }
        .tool-box.small-box { padding: 10px 5px; }
        .tool-box.small-box h4 { font-size: 11px; }
        .tool-box.small-box .date-val { font-size: 12px; margin-top: 4px; }

        .timeline-section { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .timeline-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .timeline-title { font-size: 16px; font-weight: 900; color: #111; display: flex; align-items: center; gap: 8px; }
        .timeline-title span { color: #00b48a; }
        .filter-bar { display: flex; gap: 10px; overflow-x: auto; }
        .filter-btn { padding: 8px 16px; border-radius: 20px; border: 1px solid #ddd; background: #fff; font-size: 13px; font-weight: 700; color: #666; cursor: pointer; white-space: nowrap; }
        .filter-btn.active { background: #00b48a; color: #fff; border-color: #00b48a; }

        .timeline-content { display: flex; gap: 15px; overflow-x: auto; padding: 10px 0; min-height: 100px; }
        
        .status-cards-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; cursor: pointer; border-bottom: 4px solid #eee; }
        .stat-card.active { border-bottom-color: #00b48a; background: #fffaf5; }
        .stat-card .label { font-size: 13px; font-weight: 700; color: #888; }
        .stat-card .count { font-size: 24px; font-weight: 800; color: #333; margin-top: 5px; }

        /* 입력창 영역 (직사각형 스타일로 수정) */
        .input-area-card { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 25px; border: 2px solid #00b48a; display: none; }
        .input-area-card.system-border { border-color: #00c73c; }
        .tool-textarea { width: 100%; height: 45px; border: 1px solid #ddd; border-radius: 8px; padding: 12px; font-size: 12px; resize: none; margin-bottom: 10px; box-sizing: border-box; }
    </style>
</head>
<body class="smartstore-admin">
    <!-- Login -->
    <div id="login-container" class="admin-login-wrapper">
        <div class="admin-login-card">
            <div class="admin-login-header">
                <div class="admin-logo-box"><img src="boholsean-logo.png" alt="Logo"></div>
                <h1>BOHOL SEAN</h1>
                <h2>파트너 센터</h2>
            </div>
            <form id="login-form">
                <div class="admin-form-group"><label>아이디</label><input type="text" id="username" required></div>
                <div class="admin-form-group"><label>비밀번호</label><input type="password" id="password" required></div>
                <button type="submit" class="btn-admin-login">로그인</button>
            </form>
        </div>
    </div>

    <div id="admin-container" class="admin-full-layout" style="display: none;">
        <aside class="ss-sidebar">
            <div class="ss-sidebar-brand"><img src="boholsean-logo.png" alt="Logo" class="ss-logo"><span class="ss-brand-name">관리자 센터</span></div>
            <nav class="ss-nav">
                <div class="ss-nav-group">
                    <button class="ss-nav-item active" onclick="switchMainView()"><span class="material-icons">dashboard</span> 메인 페이지</button>
                    <button class="ss-nav-item" onclick="switchAdminTab('new')"><span class="material-icons">inbox</span> 신규예약</button>
                    <button class="ss-nav-item" onclick="switchAdminTab('confirmed')"><span class="material-icons">task_alt</span> 예약확정</button>
                    <button class="ss-nav-item" onclick="switchAdminTab('resorts')"><span class="material-icons">hotel</span> 리조트 견적</button>
                    <button class="ss-nav-item" onclick="switchAdminTab('resort-confirmed')"><span class="material-icons">check_circle</span> 리조트 확정</button>
                </div>
                <div class="ss-nav-group">
                    <p class="ss-nav-label">시스템</p>
                    <button class="ss-nav-item" onclick="showInputArea('quick')"><span class="material-icons">confirmation_number</span> 퀵바우처 생성</button>
                    <button class="ss-nav-item" onclick="showInputArea('reg')"><span class="material-icons">upload_file</span> 스케줄 등록</button>
                    <button class="ss-nav-item system-danger" onclick="switchAdminTab('system')"><span class="material-icons">settings</span> 초기화</button>
                </div>
            </nav>
            <div class="ss-sidebar-footer"><button id="logout-btn"><span class="material-icons">logout</span> 로그아웃</button></div>
        </aside>

        <div class="ss-main">
            <header class="ss-top-header">
                <div class="ss-header-left"><span class="ss-breadcrumb">관리자 > <b id="breadcrumb-active">메인 페이지</b></span></div>
                <div class="ss-header-right"><span id="display-admin-id">Admin</span>님 반갑습니다.</div>
            </header>

            <div class="ss-content">
                <!-- 상단 5분할 박스 (한줄 배치) -->
                <div class="main-tool-grid">
                    <div id="tool-box-today" class="tool-box active" onclick="switchScheduleDay('today')">
                        <h4>오늘 일정</h4>
                        <div id="box-date-today" class="date-val">-</div>
                    </div>
                    <div id="tool-box-tomorrow" class="tool-box" onclick="switchScheduleDay('tomorrow')">
                        <h4>내일 일정</h4>
                        <div id="box-date-tomorrow" class="date-val">-</div>
                    </div>
                    <div class="tool-box system-box" onclick="showInputArea('quick')">
                        <h4>퀵바우처 생성기</h4>
                        <div class="date-val" style="font-size:12px;">바로가기</div>
                    </div>
                    <div class="tool-box" style="border-top-color: #007aff;" onclick="showInputArea('quote')">
                        <h4>견적서 생성기</h4>
                        <div class="date-val" style="font-size:12px;">바로가기</div>
                    </div>
                    <div class="tool-box system-box small-box" onclick="showInputArea('reg')">
                        <h4>스케줄 등록기</h4>
                        <div class="date-val">바로가기</div>
                    </div>
                </div>

                <!-- 🚀 퀵바우처 / 스케줄 등록 / 견적서 생성 입력창 (직사각형 스타일) -->
                <div id="input-area-quick" class="input-area-card">
                    <h3 style="margin:0 0 15px 0; color:#00b48a; font-size:15px;">🎫 퀵바우처 생성</h3>
                    <textarea id="quick-voucher-input" class="tool-textarea" placeholder="데이터를 붙여넣으세요..."></textarea>
                    <div style="display:flex; gap:10px;">
                        <button class="btn-action-received" style="flex:1; height:40px;" onclick="makeQuickVoucher()">생성 및 링크 복사</button>
                        <button class="btn-action-outline" style="height:40px;" onclick="hideInputArea()">닫기</button>
                    </div>
                </div>
                <div id="input-area-reg" class="input-area-card system-border">
                    <h3 style="margin:0 0 15px 0; color:#00c73c; font-size:15px;">📤 스케줄 일괄 등록 (Q열)</h3>
                    <textarea id="schedule-reg-input" class="tool-textarea" placeholder="전체 데이터를 붙여넣으세요..."></textarea>
                    <div style="display:flex; gap:10px;">
                        <button class="btn-action-received" style="flex:1; background:#00c73c; height:40px;" onclick="registerBulkSchedule()">스케줄 업데이트</button>
                        <button class="btn-action-danger" style="height:40px; padding: 0 10px;" onclick="handleClearSchedules()" title="모든 스케줄 삭제">
                            <span class="material-icons">delete_sweep</span> 클리어
                        </button>
                        <button class="btn-action-outline" style="height:40px;" onclick="hideInputArea()">닫기</button>
                    </div>
                </div>
                <div id="input-area-quote" class="input-area-card" style="border-color: #007aff;">
                    <h3 style="margin:0 0 15px 0; color:#007aff; font-size:15px;">📝 맞춤 견적서 생성</h3>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:10px;">
                        <input type="text" id="quote-customer" class="tool-textarea" style="height:35px; margin:0;" placeholder="고객명">
                        <input type="text" id="quote-contact" class="tool-textarea" style="height:35px; margin:0;" placeholder="연락처">
                    </div>
                    <textarea id="quote-items-input" class="tool-textarea" style="height:60px;" placeholder="상품정보 (예: 4/10 호핑 2명, 4/11 마사지 2명)"></textarea>
                    <div style="display:flex; gap:10px; align-items:center;">
                        <input type="number" id="quote-total" class="tool-textarea" style="height:40px; margin:0; flex:1;" placeholder="총 합계 금액 (원)">
                        <button class="btn-action-received" style="background:#007aff; border-color:#007aff; height:40px; flex:1;" onclick="createCustomQuote()">견적 링크 생성</button>
                        <button class="btn-action-outline" style="height:40px;" onclick="hideInputArea()">닫기</button>
                    </div>
                </div>

                <div class="timeline-section">
                    <div class="timeline-header">
                        <div style="display:flex; align-items:center; justify-content:space-between; width:100%;">
                            <div style="display:flex; align-items:center; gap:20px;">
                                <div class="timeline-title"><span class="material-icons">calendar_today</span> <span id="schedule-title-date">-</span> 일정</div>
                                <div class="filter-bar" style="border-bottom:none; padding-bottom:0; margin-bottom:0;">
                                    <button class="filter-btn active" onclick="filterSchedule('all')">전체</button>
                                    <button class="filter-btn" onclick="filterSchedule('픽업/샌딩')">픽업/샌딩</button>
                                    <button class="filter-btn" onclick="filterSchedule('호핑투어')">호핑투어</button>
                                    <button class="filter-btn" onclick="filterSchedule('시크릿가든 말룸파티')">시크릿가든 말룸파티</button>
                                    <button class="filter-btn" onclick="filterSchedule('랜드투어')">랜드투어</button>
                                    <button class="filter-btn" onclick="filterSchedule('액티비티')">액티비티</button>
                                </div>
                            </div>
                            <div style="display:flex; gap:8px;">
                                <button class="btn-action-received" style="height:32px; font-size:12px; background:#333; border-color:#333;" onclick="openSchedulePopup('pickup')">픽샌 명단</button>
                                <button class="btn-action-received" style="height:32px; font-size:12px; background:#00b48a; border-color:#00b48a;" onclick="openSchedulePopup('activity')">액티비티 명단</button>
                            </div>
                        </div>
                    </div>
                    <div id="active-timeline" class="timeline-content">
                        <div class="sc-empty">데이터 로딩 중...</div>
                    </div>
                </div>

                <!-- 하단 상태 카드 -->
                <div class="status-cards-row">
                    <div class="stat-card active" id="stat-new" onclick="switchAdminTab('new')">
                        <div class="label">신규 예약</div><div class="count" id="count-new">0</div>
                    </div>
                    <div class="stat-card" id="stat-confirmed" onclick="switchAdminTab('confirmed')">
                        <div class="label">예약 확정</div><div class="count" id="count-confirmed">0</div>
                    </div>
                    <div class="stat-card" id="stat-resorts" onclick="switchAdminTab('resorts')">
                        <div class="label">리조트 견적</div><div class="count" id="count-resorts">0</div>
                    </div>
                    <div class="stat-card" id="stat-resort-confirmed" onclick="switchAdminTab('resort-confirmed')">
                        <div class="label">리조트 확정</div><div class="count" id="count-resort-confirmed">0</div>
                    </div>
                </div>

                <!-- 예약 리스트 테이블 -->
                <div id="data-view-section">
                    <div class="ss-view-header">
                        <h2 id="current-view-title">예약 리스트</h2>
                        <input type="text" id="header-global-search" placeholder="고객명 검색" class="ss-search">
                    </div>
                    <div class="ss-card">
                        <div class="ss-table-wrapper">
                            <table class="ss-table">
                                <thead>
                                    <tr>
                                        <th width="40"><input type="checkbox"></th>
                                        <th width="50">번호</th>
                                        <th width="100">예약번호</th>
                                        <th width="140">고객명</th>
                                        <th>상품 정보</th>
                                        <th width="120">금액</th>
                                        <th width="100">신청일</th>
                                        <th width="90">상태</th>
                                        <th width="160">액션</th>
                                    </tr>
                                </thead>
                                <tbody id="admin-table-body"></tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- 시스템 초기화 -->
                <div id="system-setup-section" style="display: none; margin-top:30px;">
                    <div class="system-view">
                        <span class="material-icons sv-icon">security</span>
                        <h2 class="sv-title">데이터 초기화</h2>
                        <button class="btn-danger-luxury" onclick="handleClearAllData()">모든 데이터 삭제</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 상세 모달 -->
    <div id="res-detail-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <div class="modal-header"><h3>상세 정보</h3><button onclick="closeModal()">✕</button></div>
            <div class="modal-body" id="modal-body"></div>
            <div class="modal-footer"><button class="btn-action-outline" onclick="closeModal()">닫기</button></div>
        </div>
    </div>

    <!-- 💎 Luxury Mobile Bottom Navigation -->
    <nav class="ss-mobile-bottom-nav">
        <button class="mobile-nav-item active" onclick="switchMainView(); updateMobileNav(this)">
            <span class="material-icons">dashboard</span>
            <span>홈</span>
        </button>
        <button class="mobile-nav-item" onclick="switchScheduleDay('today'); updateMobileNav(this)">
            <span class="material-icons">calendar_today</span>
            <span>오늘일정</span>
        </button>
        <button class="mobile-nav-item" onclick="switchScheduleDay('tomorrow'); updateMobileNav(this)">
            <span class="material-icons">event_repeat</span>
            <span>내일일정</span>
        </button>
        <button class="mobile-nav-item" onclick="switchAdminTab('new'); updateMobileNav(this)">
            <span class="material-icons">inbox</span>
            <span>신규예약</span>
        </button>
        <button class="mobile-nav-item" onclick="switchAdminTab('confirmed'); updateMobileNav(this)">
            <span class="material-icons">task_alt</span>
            <span>확정내역</span>
        </button>
    </nav>

    <script>
        // 모바일 네비게이션 활성화 상태 업데이트
        window.updateMobileNav = (el) => {
            document.querySelectorAll('.mobile-nav-item').forEach(item => item.classList.remove('active'));
            el.classList.add('active');
        };
    </script>
    <script type="module" src="bohol-admin.js"></script>
</body>
</html>
