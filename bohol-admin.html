<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bohol Sean Admin Dashboard</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Material Symbols / Icons -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

  <!-- Custom CSS -->
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <div id="app-container">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2>
          <span class="material-symbols-outlined">sailing</span>
          Bohol Sean
        </h2>
        <p style="font-size: 0.8rem; margin-top: 0.25rem;">Admin Dashboard</p>
      </div>
      <nav class="sidebar-nav">
        <a href="#" class="nav-item active" data-view="dashboard">
          <span class="material-symbols-outlined">dashboard</span> Dashboard
        </a>
        <a href="#" class="nav-item" data-view="reservations">
          <span class="material-symbols-outlined">book_online</span> Reservations
        </a>
        <a href="#" class="nav-item" data-view="products">
          <span class="material-symbols-outlined">inventory_2</span> Products
        </a>
        <a href="#" class="nav-item" data-view="vouchers">
          <span class="material-symbols-outlined">receipt_long</span> Vouchers
        </a>
        <div style="flex-grow: 1;"></div>
        <a href="#" class="nav-item" id="logout-btn" style="color: var(--danger);">
          <span class="material-symbols-outlined">logout</span> Logout
        </a>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="top-header">
        <div>
          <h1 id="page-title">Dashboard</h1>
          <p id="page-subtitle">Overview of your daily operations.</p>
        </div>
        <div class="user-profile">
          <button class="btn btn-outline" id="mobile-menu-btn" style="display: none;">
            <span class="material-symbols-outlined">menu</span>
          </button>
          <div style="text-align: right;">
            <p style="font-weight: 600; color: var(--text-main); margin: 0;">Admin User</p>
            <p style="font-size: 0.8rem; margin: 0;">admin@boholsean.com</p>
          </div>
          <div style="width: 40px; height: 40px; background-color: var(--primary-light); color: var(--primary-color); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold;">
            A
          </div>
        </div>
      </header>

      <!-- View Container (Web Components will be rendered here) -->
      <div id="view-container">
        <dashboard-view></dashboard-view>
      </div>
    </main>
  </div>

  <!-- Firebase SDKs (Compat format for easier module-less scripting or module integration) -->
  <script type="module" src="bohol-admin.js"></script>
</body>
</html>
