<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상세 견적서 - Bohol Sean</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <!-- Flatpickr CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <style>
        :root { --primary: #00b48a; --bg: #f4f7f6; }
        body { background: var(--bg); font-family: 'Pretendard', sans-serif; padding: 20px; color: #333; line-height: 1.6; }
        .quote-container { max-width: 600px; margin: 0 auto; background: #fff; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); overflow: hidden; }
        
        .header { background: var(--primary); color: #fff; padding: 40px 30px; text-align: center; }
        .header img { width: 100px; margin-bottom: 15px; }
        .header h1 { margin: 0; font-size: 24px; font-weight: 900; letter-spacing: -1px; }
        .header p { margin: 5px 0 0; opacity: 0.9; font-size: 14px; font-weight: 600; }

        .section { padding: 25px; border-bottom: 1px solid #f0f0f0; }
        .section-title { font-size: 17px; font-weight: 800; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; color: #111; }
        .section-title .material-icons { color: var(--primary); font-size: 22px; }

        /* 입력 폼 스타일 */
        .input-group { margin-bottom: 15px; position: relative; }
        .input-group label { display: block; font-size: 13px; font-weight: 700; color: #666; margin-bottom: 6px; }
        .input-group label span { color: #ff4b4b; margin-left: 2px; }
        .input-group input { width: 100%; padding: 14px 14px 14px 45px; border: 1.5px solid #eee; border-radius: 12px; font-size: 15px; box-sizing: border-box; transition: 0.2s; background: #fff; }
        .input-group input:focus { border-color: var(--primary); outline: none; background: #f0fbf8; }
        .input-group .input-icon { position: absolute; left: 15px; top: 36px; color: #bbb; font-size: 20px; z-index: 1; }

        .item-list { display: flex; flex-direction: column; gap: 12px; }
        .item { background: #f9fafb; padding: 18px; border-radius: 16px; border: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .item-info { flex: 1; }
        .item-name { display: block; font-size: 15px; font-weight: 800; color: #111; margin-bottom: 4px; }
        .item-meta { font-size: 13px; color: #666; font-weight: 600; }
        .item-price { font-size: 15px; font-weight: 800; color: var(--primary); }

        /* 투어별 상세 설정 카드 */
        .tour-setting-card { background: #fff; border: 1.5px solid #eee; border-radius: 18px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .tour-setting-card .tour-name { font-size: 15px; font-weight: 800; color: var(--primary); margin-bottom: 15px; display: block; padding-bottom: 10px; border-bottom: 1px solid #f5f5f5; }

        .total-box { padding: 30px; background: #fdfdfd; text-align: center; }
        .total-label { font-size: 14px; color: #888; font-weight: 600; }
        .total-amount { font-size: 32px; font-weight: 900; color: #111; margin-top: 5px; }
        
        /* 계좌 정보 박스 */
        .account-card { background: #f0f7f4; border-radius: 18px; padding: 25px; margin-top: 10px; border: 1px solid #e0eeea; }
        .account-info { text-align: center; }
        .bank-name { font-size: 14px; font-weight: 700; color: #666; }
        .account-number { font-size: 20px; font-weight: 900; color: #111; margin: 5px 0 15px; display: block; }
        .btn-copy { background: #fff; border: 1.5px solid var(--primary); color: var(--primary); padding: 8px 20px; border-radius: 50px; font-size: 13px; font-weight: 800; cursor: pointer; transition: 0.2s; }
        .btn-copy:hover { background: var(--primary); color: #fff; }

        .btn-submit { width: 100%; background: #111; color: #fff; border: none; padding: 20px; border-radius: 16px; font-size: 18px; font-weight: 800; cursor: pointer; margin-top: 30px; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s; }
        .btn-submit:hover { background: var(--primary); transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,180,138,0.2); }

        .footer-note { padding: 20px; font-size: 13px; color: #888; text-align: center; line-height: 1.6; }

        #loading { text-align: center; padding: 100px 20px; color: #999; }

        /* Flatpickr Mobile Fix */
        .flatpickr-calendar { font-family: 'Pretendard', sans-serif; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid #eee; }
        .flatpickr-day.selected { background: var(--primary) !important; border-color: var(--primary) !important; }

        @media (max-width: 480px) {
            body { padding: 10px; }
            .section { padding: 20px 15px; }
            .tour-setting-card { padding: 15px; }
            .input-group input { padding: 12px 12px 12px 40px; font-size: 14px; }
            .input-group .input-icon { top: 34px; left: 12px; }
        }
    </style>
</head>
<body>

<div class="quote-container" id="main-container" style="display: none;">
    <div class="header">
        <img src="boholsean-logo.png" alt="Bohol Sean">
        <h1>BOHOL SEAN</h1>
        <p>고객님만을 위한 맞춤 견적서</p>
    </div>

    <!-- 1. 견적 항목 -->
    <div class="section" style="background: #fafafa;">
        <div class="section-title"><span class="material-icons">receipt_long</span>선택하신 투어 및 상품</div>
        <div class="item-list" id="item-list"></div>
        
        <div class="total-box">
            <div class="total-label">최종 합계 금액</div>
            <div class="total-amount" id="total-amount">₩ 0</div>
        </div>
    </div>

    <!-- 2. 예약자 정보 -->
    <div class="section">
        <div class="section-title"><span class="material-icons">person</span>예약자 기본 정보</div>
        <div class="input-group">
            <label>대표자 성함 (한글)<span>*</span></label>
            <span class="material-icons input-icon">badge</span>
            <input type="text" id="cust-name-kor" placeholder="예: 홍길동">
        </div>
        <div class="input-group">
            <label>대표자 영문 이름 (여권 동일)<span>*</span></label>
            <span class="material-icons input-icon">language</span>
            <input type="text" id="cust-name-eng" placeholder="예: HONG GILDONG">
        </div>
    </div>

    <!-- 3. 투어별 세부 정보 -->
    <div class="section">
        <div class="section-title"><span class="material-icons">calendar_month</span>투어별 희망 날짜 및 장소 설정</div>
        <div id="tour-settings-container">
            <!-- 각 투어별 입력 카드가 여기에 생성됨 -->
        </div>
    </div>

    <!-- 4. 결제 및 확정 안내 -->
    <div class="section">
        <div class="section-title"><span class="material-icons">payments</span>결제 및 확정 안내</div>
        <div class="account-card">
            <div class="account-info">
                <span class="bank-name">국민은행 (예금주: 윤오현)</span>
                <span class="account-number" id="acc-num">058102-04-044157</span>
                <button class="btn-copy" onclick="copyAccount()">계좌번호 복사하기</button>
            </div>
        </div>

        <button class="btn-submit" onclick="submitReservation()">
            <span class="material-icons">check_circle</span> 입금 완료 및 예약 신청
        </button>
        
        <div class="footer-note">
            신청 버튼을 누르시면 <b>보홀션 카카오톡</b>으로 연결됩니다.<br>
            메시지를 보내주셔야 최종 예약 확인이 가능합니다.
        </div>
    </div>
</div>

<div id="loading">데이터를 불러오는 중입니다...</div>

<!-- Flatpickr JS -->
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ko.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCqvsvuOGnQoNL3J0oGsOcN66ZOP0JlN5w",
        authDomain: "boholsean-14014193-11202.firebaseapp.com",
        projectId: "boholsean-14014193-11202",
        storageBucket: "boholsean-14014193-11202.firebasestorage.app",
        messagingSenderId: "684378696978",
        appId: "1:684378696978:web:868e1e33581f38a188d7cb"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let currentDocId = null;
    let tourItems = [];

    async function loadQuote() {
        const urlParams = new URLSearchParams(window.location.search);
        currentDocId = urlParams.get('id');
        if (!currentDocId) {
            document.getElementById('loading').textContent = "잘못된 접근입니다.";
            return;
        }

        try {
            const docRef = doc(db, "quotes", currentDocId);
            const docSnap = await getDoc(docRef);

            if (docSnap.exists()) {
                const data = docSnap.data();
                tourItems = data.items || [];

                const listContainer = document.getElementById('item-list');
                listContainer.innerHTML = '';
                
                const settingsContainer = document.getElementById('tour-settings-container');
                settingsContainer.innerHTML = '';

                tourItems.forEach((item, index) => {
                    const itemDiv = document.createElement('div');
                    itemDiv.className = 'item';
                    itemDiv.innerHTML = `
                        <div class="item-info">
                            <span class="item-name">${item.name}</span>
                            <span class="item-meta">수량: ${item.count}</span>
                        </div>
                        <div class="item-price">₩ ${(item.price * item.count).toLocaleString()}</div>
                    `;
                    listContainer.appendChild(itemDiv);

                    const settingCard = document.createElement('div');
                    settingCard.className = 'tour-setting-card';
                    settingCard.innerHTML = `
                        <span class="tour-name">${item.name}</span>
                        <div class="input-group">
                            <label>투어 희망 날짜<span>*</span></label>
                            <span class="material-icons input-icon">calendar_today</span>
                            <input type="text" class="tour-date-input" data-index="${index}" placeholder="날짜를 선택해 주세요" readonly>
                        </div>
                        <div class="input-group">
                            <label>픽업 리조트 / 장소<span>*</span></label>
                            <span class="material-icons input-icon">location_on</span>
                            <input type="text" class="tour-resort-input" data-index="${index}" placeholder="예: 헤난 알로나 로비">
                        </div>
                    `;
                    settingsContainer.appendChild(settingCard);
                });

                // Flatpickr 적용
                flatpickr(".tour-date-input", {
                    locale: "ko",
                    dateFormat: "Y-m-d",
                    minDate: "today",
                    disableMobile: true,
                    monthSelectorType: 'static'
                });

                document.getElementById('total-amount').textContent = '₩ ' + (data.totalPrice || 0).toLocaleString();
                document.getElementById('loading').style.display = 'none';
                document.getElementById('main-container').style.display = 'block';
            } else {
                document.getElementById('loading').textContent = "만료되었거나 존재하지 않는 견적서입니다.";
            }
        } catch (error) {
            console.error("Error loading quote:", error);
            document.getElementById('loading').textContent = "데이터 오류가 발생했습니다.";
        }
    }

    window.copyAccount = () => {
        const acc = document.getElementById('acc-num').innerText;
        navigator.clipboard.writeText(acc.replace(/-/g, '')).then(() => {
            alert('계좌번호가 복사되었습니다.');
        });
    };

    window.submitReservation = async () => {
        const nameKor = document.getElementById('cust-name-kor').value.trim();
        const nameEng = document.getElementById('cust-name-eng').value.trim();

        if (!nameKor || !nameEng) {
            alert('예약자 기본 정보를 모두 입력해 주세요.');
            return;
        }

        const updatedItems = tourItems.map((item, index) => {
            const date = dateInputs[index].value;
            const resort = resortInputs[index].value.trim();
            if (!date || !resort) allFilled = false;
            return {
                ...item,
                date: date,
                pickup: resort
            };
        });

        if (!allFilled) {
            alert('모든 투어의 날짜와 픽업 장소를 입력해 주세요.');
            return;
        }

        try {
            // 1. 견적서 원본 업데이트
            const docRef = doc(db, "quotes", currentDocId);
            await updateDoc(docRef, {
                customerKorName: nameKor,
                customerEngName: nameEng,
                items: updatedItems,
                status: '예약신청완료',
                updatedAt: new Date()
            });

            // 2. 관리자용 예약 데이터 생성
            const resData = {
                customerKorName: nameKor,
                customerEngName: nameEng,
                items: updatedItems, // 상세 날짜/픽업지 포함
                totalPrice: updatedItems.reduce((acc, item) => acc + (item.price * item.count), 0),
                status: '입금확인요청',
                createdAt: new Date(),
                reservationNumber: 'Q-' + currentDocId.substring(0, 5).toUpperCase(),
                source: 'quote_maker',
                requests: "견적서 통해 고객이 직접 입력한 예약입니다."
            };

            const newResRef = await addDoc(collection(db, "reservations"), resData);
            console.log("Reservation added with ID: ", newResRef.id);

            alert('예약 신청이 완료되었습니다!\n확인을 위해 카카오톡 상담 채팅으로 연결합니다.');
            window.location.href = "http://pf.kakao.com/_JxoxlTG/chat";
        } catch (e) {
            console.error(e);
            alert('처리 중 오류가 발생했습니다.');
        }
    };

    window.onload = loadQuote;
</script>

</body>
</html>
