<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>예약 확인 및 상세 일정 - BOHOL SEAN</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="reservation.css">
</head>
<body>

<div class="reservation-container">
    <div class="res-header">
        <img src="boholsean-logo.png" alt="Bohol Sean Logo" class="res-logo">
        <h1>예약 확인서</h1>
        <p class="res-subtitle">BOHOL SEAN CONFIRMATION</p>
    </div>

    <div class="res-content">
        <!-- 고객 기본 정보 -->
        <div class="res-section">
            <h2 class="section-title">예약 정보 (Reservation Info)</h2>
            <div class="info-card">
                <div class="info-row"><span class="label">대표자명</span><span class="value" id="v-name">-</span></div>
                <div class="info-row"><span class="label">구매처</span><span class="value" id="v-contact">-</span></div>
                <div class="info-row"><span class="label">예약인원</span><span class="value" id="v-pax">-</span></div>
            </div>
        </div>

        <!-- 픽업/샌딩 정보 -->
        <div class="res-section">
            <h2 class="section-title">항공 및 리조트 (Flight & Resort)</h2>
            <div class="info-card">
                <div class="info-row"><span class="label">픽업정보</span><span class="value" id="v-pickup">-</span></div>
                <div class="info-row"><span class="label">샌딩정보</span><span class="value" id="v-sending">-</span></div>
                <div class="info-row"><span class="label">숙소정보</span><span class="value highlight" id="v-resort">-</span></div>
            </div>
        </div>

        <!-- 결제 정보 -->
        <div class="res-section">
            <h2 class="section-title">결제 및 잔금 (Payment)</h2>
            <div class="info-card balance-card">
                <div class="info-row"><span class="label">현장 결제 잔금</span><span class="value balance-value" id="v-exchange">-</span></div>
                <p class="balance-note">* 현지 지불 금액은 페소(PHP)로 준비해 주세요.</p>
            </div>
        </div>

        <!-- 상세 일정 (바우처 리스트) -->
        <div class="res-section">
            <h2 class="section-title">상세 일정 (Schedule)</h2>
            <div id="v-items-list">
                <!-- 아이템들이 여기에 렌더링됩니다 -->
            </div>
        </div>

        <div class="footer-notice">
            <p>보홀 션 투어를 이용해 주셔서 감사합니다.</p>
            <p>픽업 시간 10분 전까지 미팅 장소 대기 부탁드립니다.</p>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCqvsvuOGnQoNL3J0oGsOcN66ZOP0JlN5w",
        authDomain: "boholsean-14014193-11202.firebaseapp.com",
        projectId: "boholsean-14014193-11202",
        storageBucket: "boholsean-14014193-11202.firebasestorage.app",
        messagingSenderId: "684378696978",
        appId: "1:684378696978:web:868e1e33581f38a188d7cb"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function initVoucher() {
        const urlParams = new URLSearchParams(window.location.search);
        const resId = urlParams.get('id');
        const itemIdx = urlParams.get('itemIndex');
        const contact = urlParams.get('contact');

        if (resId) {
            // 단일 예약 건 상세
            const resSnap = await getDoc(doc(db, "reservations", resId));
            const quickSnap = await getDoc(doc(db, "quick_vouchers", resId));
            
            if (resSnap.exists()) renderSingleVoucher(resSnap.data(), itemIdx);
            else if (quickSnap.exists()) renderSingleVoucher(quickSnap.data(), itemIdx);
        } else if (contact) {
            // 연락처 기준 통합 일정
            const q = query(collection(db, "reservations"), where("contact", "==", contact));
            const q2 = query(collection(db, "quick_vouchers"), where("contact", "==", contact));
            const snap = await getDocs(q);
            const snap2 = await getDocs(q2);
            let allItems = [];
            let baseData = null;

            snap.docs.forEach(d => { 
                const data = d.data(); if (!baseData) baseData = data;
                (data.items || []).forEach(it => allItems.push(it));
            });
            snap2.docs.forEach(d => {
                const data = d.data(); if (!baseData) baseData = data;
                (data.items || []).forEach(it => allItems.push(it));
            });

            if (baseData) {
                baseData.items = allItems;
                renderSingleVoucher(baseData, null);
            }
        }
    }

    function renderSingleVoucher(resData, filterIdx) {
        document.getElementById('v-name').innerText = resData.customerKorName || '-';
        document.getElementById('v-contact').innerText = resData.contact || '-';
        document.getElementById('v-pax').innerText = resData.paxInfo || '-';
        document.getElementById('v-pickup').innerText = `${resData.pickupDate || '-'} / ${resData.pickupFlight || '-'}`;
        document.getElementById('v-sending').innerText = `${resData.sendingDate || '-'} / ${resData.sendingFlight || '-'}`;
        document.getElementById('v-resort').innerText = resData.pickupResort || '-';
        
        // 💎 잔금 표시 깔끔하게 수정
        let exText = resData.exchangeAmount || '전액 결제 완료';
        if (exText !== '전액 결제 완료' && !exText.includes('₱')) {
            exText = `₱ ${exText.replace(/GET:/gi, '').trim()}`;
        } else if (exText.includes('GET:')) {
            exText = exText.replace(/GET:/gi, '₱').trim();
        }
        document.getElementById('v-exchange').innerText = exText;

        const listContainer = document.getElementById('v-items-list');
        listContainer.innerHTML = '';

        let items = resData.items || [];
        if (filterIdx !== null) items = [items[filterIdx]];

        items.sort((a, b) => a.date.localeCompare(b.date));

        items.forEach(item => {
            if (!item) return;
            const itemCard = document.createElement('div');
            itemCard.className = 'item-card';

            let guidanceMsg = '';
            const lowerName = (item.name || '').toLowerCase();
            const time = item.time || "09:00";
            // 💎 개별 아이템에 지정된 장소가 있으면 우선 사용, 없으면 전체 예약 장소 사용
            const resort = item.meetingPlace || resData.pickupResort || "-";

            if (lowerName.includes("파밀라칸")) {
                guidanceMsg = `미팅 장소 및 시간 : ${resort} 로비 / ${time} (전날 재안내)\n\n★ 주의 사항 및 준비물\n- 젖어도 되는 복장\n- 쪼리등 슬리퍼 비추천, 긴옷 추천\n- 매너팁 1인 100페소 (성인, 소인 동일)`;
            } else if (lowerName.includes("오슬롭")) {
                guidanceMsg = `미팅 장소 및 시간 : ${resort} 로비 / ${time} (전날 재안내)\n\n★ 주의 사항 및 준비물\n- 젖어도 되는 복장\n- 쪼리등 슬리퍼 비추천, 긴옷 추천\n- 매너팁 1인 100페소 (성인, 소인 동일)\n- 자외선 차단제 사용 불가`;
            } else if (lowerName.includes("낚시")) {
                guidanceMsg = `미팅 장소 및 시간 : ${resort} 로비 / ${time} (전날 재안내)\n\n★ 주의 사항 및 준비물\n- 젖어도 되는 복장\n- 쪼리등 슬리퍼 비추천, 긴옷 추천\n- 매너팁 1인 100페소 (성인, 소인 동일)`;
            } else if (lowerName.includes("육상투어d") || lowerName.includes("육상투어 d")) {
                guidanceMsg = `미팅 장소 및 시간 : ${resort} 로비 / ${time}\n\n★ 주의 사항 및 준비물\n- 편한 복장\n- 쪼리등 슬리퍼 비추천, 긴옷 추천 (바클라욘 입장 제한)\n- 매너팁 1인 100페소 (성인, 소인 동일)`;
            } else if (lowerName.includes("육상투어c") || lowerName.includes("육상투어 c")) {
                guidanceMsg = `미팅 장소 및 시간 : ${resort} 로비 / ${time}\n\n★ 주의 사항 및 준비물\n- 편한 복장\n- 쪼리등 슬리퍼 비추천, 긴옷 추천 (바클라욘 입장 제한)\n- 매너팁 1인 100페소 (성인, 소인 동일)`;
            } else if (lowerName.includes("샤인") || lowerName.includes("호핑")) {
                guidanceMsg = `미팅 장소 및 시간 : ${resort} 로비 / ${time} (전날 재안내)\n\n★ 주의 사항 및 준비물\n- 편한 물놀이 복장, 비치타올 인당 1개\n- 쪼리등 슬리퍼 비추천, 긴옷 추천\n- 해파리 출몰 대비 긴팔/긴바지 래쉬가드 추천\n- 매너팁 1인 100페소 (성인, 소인 동일)`;
            } else if (lowerName.includes("나팔링")) {
                guidanceMsg = `미팅 장소 및 시간 : ${resort} 로비 / ${time}\n\n★ 주의 사항 및 준비물\n- 편한 물놀이 복장, 비치타올 인당 1개\n- 쪼리등 슬리퍼 비추천, 긴옷 추천\n- 매너팁 1인 100페소 (성인, 소인 동일)`;
            } else if (lowerName.includes("마사지") || lowerName.includes("힐롯") || lowerName.includes("스파") || lowerName.includes("stone") || lowerName.includes("스톤")) {
                guidanceMsg = `미팅 장소 및 시간 : ${resort} 로비 / ${time}\n\n★ 주의 사항 및 준비물\n- 간편한 복장 (소지품 주의)\n- 매너팁 1인 100페소 (성인, 소인 동일)`;
            } else if (lowerName.includes("항구")) {
                guidanceMsg = `미팅 장소 및 시간 : 탁빌라란 항구 / ${time} (도착 후)\n\n★ 안내 사항\n- 항구 내 티켓 발권이나 환경세는 직접 내셔야 합니다.\n- 티켓 교환 사무실은 바깥쪽에 위치하므로 입구에 내리셔야 합니다.`;
            } else if (lowerName.includes("반딧불") || lowerName.includes("firefly")) {
                guidanceMsg = `미팅 장소 및 시간 : ${resort} 로비 / ${time}\n\n★ 주의 사항 및 준비물\n- 편한 복장\n- 매너팁 1인 100페소 (성인, 소인 동일)`;
            } else if (lowerName.includes("보홀쇼")) {
                guidanceMsg = `미팅 장소 및 시간 : ${resort} 로비 / ${time}\n\n★ 주의 사항 및 준비물\n- 간편한 복장 (소지품 주의)\n- 매너팁 1인 100페소 (성인, 소인 동일)`;
            } else {
                guidanceMsg = `미팅 장소 및 시간 : ${resort} / ${time}\n\n★ 안내 사항\n- 매너팁 1인 100페소 (성인, 소인 동일)\n- 픽업 지연 등 문제 발생 시 긴급 연락처로 문의 바랍니다.`;
            }

            itemCard.innerHTML = `
                <div class="item-header">
                    <span class="item-date">📅 ${item.date}</span>
                    <span class="item-pax">${item.count}명</span>
                </div>
                <div class="item-body">
                    <h3 class="item-name">${item.name}</h3>
                    <p class="item-guidance">${guidanceMsg}</p>
                </div>
            `;
            listContainer.appendChild(itemCard);
        });
    }

    initVoucher();
</script>

</body>
</html>
