<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>예약 확인서 - Bohol Sean</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', sans-serif; background: #f0f2f5; margin: 0; padding: 40px 20px; color: #333; line-height: 1.6; }
        .voucher-container { max-width: 800px; margin: 0 auto; background: #fff; border-radius: 30px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.1); }
        .voucher-header { background: #00b48a; color: #fff; padding: 40px; text-align: center; }
        .voucher-header img { width: 80px; margin-bottom: 15px; }
        .voucher-header h1 { margin: 0; font-size: 28px; font-weight: 900; letter-spacing: 2px; }
        .voucher-header p { margin: 10px 0 0 0; opacity: 0.6; font-size: 14px; }
        
        .voucher-body { padding: 40px; }
        .section-title { font-size: 18px; font-weight: 800; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; color: #00b48a; }
        .section-title::before { content: ''; width: 4px; height: 18px; background: #00b48a; border-radius: 2px; }
        
        .info-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; background: #f9fafb; padding: 25px; border-radius: 20px; margin-bottom: 40px; }
        .info-item label { display: block; font-size: 12px; color: #888; margin-bottom: 5px; font-weight: 600; }
        .info-item span { display: block; font-size: 16px; font-weight: 700; color: #111; }
        
        .item-card { border: 1px solid #eee; border-radius: 20px; padding: 25px; margin-bottom: 20px; transition: 0.3s; }
        .item-card:hover { border-color: #00b48a; box-shadow: 0 10px 30px rgba(0,180,138,0.05); }
        .item-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .item-name { font-size: 18px; font-weight: 800; color: #111; }
        .item-status { background: #fff5eb; color: #00b48a; font-size: 12px; font-weight: 800; padding: 6px 12px; border-radius: 50px; }
        
        .item-details { display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 15px; }
        .detail-point { font-size: 14px; color: #666; display: flex; align-items: center; gap: 8px; }
        .detail-point .material-icons { font-size: 18px; color: #00b48a; }
        .detail-point b { color: #111; margin-right: 4px; }

        .guidance-box { font-size: 14px; color: #555; line-height: 1.7; white-space: pre-wrap; margin-top: 15px; padding-top: 15px; border-top: 1px dashed #eee; }
        .map-btn { display: inline-block; margin: 8px 0; padding: 8px 15px; background: #fff; border: 1px solid #00b48a; color: #00b48a; border-radius: 8px; font-size: 12px; font-weight: 700; text-decoration: none; }
        .map-btn:hover { background: #00b48a; color: #fff; }

        .notice-box { background: #fff8e6; border-radius: 20px; padding: 25px; border: 1px solid #ffeeba; margin-top: 40px; }
        .notice-box h4 { margin: 0 0 10px 0; font-size: 15px; font-weight: 800; color: #856404; }
        .notice-box ul { margin: 0; padding-left: 20px; font-size: 13px; color: #856404; }
        
        .print-btn { position: fixed; bottom: 30px; right: 30px; background: #00b48a; color: #fff; border: none; padding: 15px 30px; border-radius: 50px; font-weight: 800; cursor: pointer; box-shadow: 0 10px 30px rgba(0,180,138,0.3); transition: 0.3s; z-index: 1000; }
        
        @media print {
            body { padding: 0; background: #fff; }
            .print-btn { display: none; }
            .voucher-container { box-shadow: none; border-radius: 0; max-width: 100%; margin: 0; }
        }
    </style>
</head>
<body>

<div class="voucher-container">
    <div class="voucher-header">
        <img src="logo.png" alt="보라카이션">
        <h1>BORACAY_SEAN</h1>
        <p>GUEST RESERVATION VOUCHER</p>
    </div>

    <div class="voucher-body">
        <div class="section-title">예약자 정보</div>
        <div class="info-grid">
            <div class="info-item"><label>대표자명</label><span id="v-name">-</span></div>
            <div class="info-item"><label id="label-agency">연락처</label><span id="v-agency">-</span></div>
            <div class="info-item"><label id="label-exchange">환전요청</label><span id="v-exchange">-</span></div>
            <div class="info-item"><label id="label-pax">인원정보</label><span id="v-pax">-</span></div>

        <div class="section-title">투어 및 액티비티 일정</div>
        <div id="item-list">
            <div id="loading" style="text-align:center; padding:40px; color:#999;">데이터를 불러오는 중...</div>

        <div class="notice-box">

            <ul>
                <li>모든 일정은 현지 기상 상황 및 업체 사정에 의해 다소 변경될 수 있습니다.</li>
                <li>픽업 시간 10분 전까지 약속 장소에서 대기해 주시기 바랍니다.</li>

            </ul>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDkDjmGKQDF-0Vu2S_qtI6W5Hf2-j4tKcM",
        authDomain: "boholsean-69b4a.firebaseapp.com",
        projectId: "boholsean-69b4a",
        storageBucket: "boholsean-69b4a.firebasestorage.app",
        messagingSenderId: "806585874771",
        appId: "1:806585874771:web:64a094d241730ca38109a6"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // --- 🏨 리조트 한글명 매핑 데이터 ---
    const resortMap = {
        'henann garden': '헤난 가든',
        'henann lagoon': '헤난 라군',
        'henann prime': '헤난 프라임',
        'henann park': '헤난 파크',
        'henann crystal sands': '헤난 크리스탈 샌즈',
        'henann palm beach': '헤난 팜 비치',
        'henann regency': '헤난 리젠시',
        'h.sands': '헤난 크리스탈 샌즈',
        'h sands': '헤난 크리스탈 샌즈',
        'h.garden': '헤난 가든',
        'h garden': '헤난 가든',
        'h.lagoon': '헤난 라군',
        'h lagoon': '헤난 라군',
        'h.prime': '헤난 프라임',
        'h prime': '헤난 프라임',
        'h.park': '헤난 파크',
        'h park': '헤난 파크',
        'h.palm': '헤난 팜 비치',
        'h palm': '헤난 팜 비치',
        'h.regency': '헤난 리젠시',
        'h regency': '헤난 리젠시',
        'p.garden': '파라다이스 가든',
        'p garden': '파라다이스 가든',
        'paradise garden': '파라다이스 가든',
        'm.bay': '만다린 베이',
        'm bay': '만다린 베이',
        'mandarin bay': '만다린 베이',
        'mandarin island': '만다린 아일랜드',
        'm,bay': '만다린 베이',
        'mbay': '만다린 베이',
        'asya': '아샤',
        'crimson': '크림슨',
        'movenpick': '모벤픽',
        'shangri-la': '샹그릴라',
        'shangrila': '샹그릴라',
        'discovery shores': '디스커버리 쇼어',
        'hue': '휴 리조트',
        'fairways': '페어웨이',
        'feliz': '펠리즈',
        'astoria': '아스토리아',
        'coast': '코스트',
        'the lind': '더 린드',
        'aqua': '아쿠아 보라카이',
        'belmont': '벨몬트',
        'savoy': '사보이',
        'la carmela': '라카멜라',
        'lacarmela': '라카멜라',
        'two seasons': '투 시즌스',
        'red coconut': '레드 코코넛',
        'canyon': '캐년'
    };

    function getKorResort(engName) {
        if (!engName) return '';
        const low = engName.toLowerCase();
        for (const [eng, kor] of Object.entries(resortMap)) {
            if (low.includes(eng)) return kor;
        }
        return engName; // 매핑 안되면 원래 이름 반환
    }

    // 📍 스테이션 1~0 지역 리조트인지 확인 (샌딩 시간 08:10 적용 대상)
    function isStation10(resortName) {
        if (!resortName) return false;
        const low = resortName.toLowerCase();
        const station10Keywords = [
            'crimson', 'movenpick', 'shangri-la', 'shangrila', 'discovery', 'the lind', 'lind',
            'prime', 'aqua', 'two seasons', 'canyon', 'savoy', 'belmont', 'fairways', 'savoy'
        ];
        return station10Keywords.some(kw => low.includes(kw));
    }

    // ✈️ 항공편명으로 공항 자동 판별 (칼리보 vs 카티클란)
    function getAirportName(flight) {
        if (!flight) return "칼리보 공항";
        const fl = flight.toUpperCase().replace(/\s/g, '');
        
        // 1. 카티클란 (MPH) 국내선 대표 패턴 (매우 구체적으로 설정)
        if (fl.startsWith('PR20') || fl.startsWith('5J8') || fl.startsWith('5J9') || 
            fl.startsWith('DG') || fl.startsWith('Z22') || fl.includes('MPH')) {
            return "카티클란 공항";
        }
        
        // 2. 칼리보 (KLO) 패턴 (국제선 및 칼리보 국내선)
        if (fl.startsWith('TW') || fl.startsWith('7C') || fl.startsWith('LJ') || fl.startsWith('BX') || 
            fl.startsWith('ZE') || fl.startsWith('RS') || fl.startsWith('KE') || fl.startsWith('OZ') || 
            fl.startsWith('PR4') || fl.startsWith('PR14') || fl.startsWith('5J1') || 
            fl.startsWith('PR29') || fl.startsWith('Z27') || fl.includes('KLO')) {
            return "칼리보 공항";
        }
        
        // 3. 기본값 (알 수 없는 경우 카티클란으로 안내하여 안전성 확보)
        return "카티클란 공항";
    }

    // --- 📅 투어별 상세 안내문 생성기 ---
    function getTourGuidance(name, item, res) {
        const details = (item.details || "").toLowerCase();
        const lowerName = name.toLowerCase();
        const tourMonth = item.date ? parseInt(item.date.split('-')[1]) : new Date().getMonth() + 1;
        const isDrySeason = tourMonth <= 5 || tourMonth >= 11;

        // 1. 공항 픽업 (명칭 유연하게 매칭)
        if (lowerName.includes('공항 픽업') || lowerName.includes('meeting') || lowerName.includes('pickup')) {
            const airport = getAirportName(res.pickupFlight || item.details);
            return `<div class="guidance-box"><b>미팅 장소 : ${airport} 밖 피켓 대기</b>\n\n★공항 밖에서 보라카이션 픽업 직원이 보라카이션 피켓을 들고 대기 하고 있습니다.\n픽업 직원과 대표자 성함 확인 후 안내에 따라 주시기 바랍니다. 항공이 딜레이가 되도 기다립니다.</div>`;
        }
        // 2. 공항 샌딩 (명칭 유연하게 매칭)
        if (lowerName.includes('공항 샌딩') || lowerName.includes('sending')) {
            const rawResort = res.sendingResort || res.pickupResort || '';
            let sendingPlace = getKorResort(rawResort);
            const airport = getAirportName(res.sendingFlight || item.details);
            
            // 📍 페어웨이 정문 게이트 규칙 적용
            if (sendingPlace.includes('페어웨이')) {
                sendingPlace = '페어웨이 정문게이트';
            }

            return `<div class="guidance-box"><b>미팅 시간/장소 : ${item.time} ${sendingPlace}</b>\n\n*교통상황에 따라 ${airport} 샌딩 미팅 시간과 장소가 변경될 수있습니다\n\n★지정된 장소와 시간전에 먼저 도착 하셔서 대기 해주셔야 합니다.\n리조트 체크아웃을 완료하고 샌딩 출발 하는 시간 입니다.\n늦어서 별도로 이동을 해야 하는 경우 추가 요금이 발생 합니다.</div>`;
        }
        // 3. 블랙펄 호핑
        if (name.includes('블랙펄')) {
            const isLunch = name.includes('점보') || name.includes('점심') || details.includes('점보') || details.includes('식사 포함');
            if (isLunch) {
                return `<div class="guidance-box"><b>투어 미팅 시간 / 장소 : 12:30 / 점보크랩</b>\n<a href="https://goo.gl/maps/d6tdF8tME3p16NtCA" class="map-btn" target="_blank">📍 미팅장소 구글맵 확인</a>\n\n*점보크랩은 메인로드 졸리비 바로 건너편 입니다~\n\n★ 준비물\n편한 물놀이 복장, 비치타올1인 1장\n스노클 마스크(보유시)\n보트맨팁 1인 100페소 (성인, 소인 동일)\n그외 개인적으로 필요한 물품\n\n🎉 블랙펄 기념일 이벤트 안내\n호핑투어 중 생일, 결혼기념일, 프로포즈, 기념일 축하가 있으시면 저희 블랙펄에서 작게 축하 이벤트를 진행해드립니다!\n👉 해당되는 경우 미팅 전까지 카카오톡으로 알려주세요! 사전 요청 필수 / 무료 서비스</div>`;
            } else {
                const meetingPlace = isDrySeason ? '8 Eight by the Beach' : '블라복 비치 목샤';
                const mapLink = isDrySeason ? 'https://maps.app.goo.gl/Wa491bdTXuKZ2BtB8' : 'https://www.google.co.kr/maps/place/Moksha+Cafe/@11.9676741,121.9274171,21z/data=!4m6!3m5!1s0x33a53d8366366ae1:0x48910864ce8dc2e6!8m2!3d11.967602!4d121.9274642!16s%2Fg%2F11sh1khm47';
                return `<div class="guidance-box"><b>투어 미팅 시간 / 장소 : 13:30 / ${meetingPlace}</b>\n<a href="${mapLink}" class="map-btn" target="_blank">📍 미팅장소 구글맵 확인</a>\n\n-트라이씨클로 미팅장소 이동 시-\n트라이씨클 기사에게 “${meetingPlace}" 라고 꼭 말해주세요!\n내리신 후 비치로 이동하셔서 좌측편으로 미팅장소 확인 가능합니다.\n\n★★ 주의 사항 및 준비물 ★★\n\n*주의 사항 - 미팅시간에서 10분이상 늦으시면 노쇼처리되며, 별도 연락없이 출항합니다. 이 경우 환불 및 일정 변경 불가하오니 꼭 미팅시간을 지켜주세요\n\n편한 물놀이 복장, 비치타올1인 1장\n스노클 마스크(보유시)\n보트맨팁 1인 100페소 (성인, 소인 동일)\n그외 개인적으로 필요한 물품\n\n🎉 블랙펄 기념일 이벤트 안내\n호핑투어 중 생일, 결혼기념일, 프로포즈, 기념일 축하가 있으시면 저희 블랙펄에서 작게 축하 이벤트를 진행해드립니다!\n👉 해당되는 경우 미팅 전까지 카카오톡으로 알려주세요! 사전 요청 필수 / 무료 서비스</div>`;
            }
        }
        // 3-1. 보라아재 호핑
        if (name.includes('보라아재') || name.includes('카라바오')) {
            return `<div class="guidance-box"><b>투어 미팅 시간 / 장소 : 08:00 / 각반 선착장 세븐일레븐 앞</b>\n\n★ 미팅 상세\n- 오전 8시까지 각반(CAGBAN PORT) 선착장 세븐일레븐 앞 보라아재 피켓 든 직원을 찾아주세요.\n- 디몰에서 트라이시클로 약 15분 소요됩니다.\n\n★ 준비물\n래쉬가드, 선크림, 비치타올, 아쿠아슈즈\n매너팁 인당 200페소 (유아 포함)\n그외 개인적으로 필요한 물품 (방수팩, 멀미약 등)\n\n★ 포함 사항\n씨푸드런치, 무제한 음료/맥주/물, 라면간식, 사진촬영, 스노클 장비 대여, 다양한 액티비티(슬라이드, 다이빙 등)\n\n*주의 사항 - 미팅시간 미 준수 시 노쇼 처리되며 환불 불가합니다. 36개월 이하 유아 식사는 별도로 지참해 주세요.</div>`;
        }
        // 4. 말룸파티
        if (name.includes('말룸파티') || name.toLowerCase().includes('malum')) {
            const isSending = name.includes('샌딩') || details.includes('샌딩');
            if (isSending) {
                let meetingPlace = getKorResort(res.pickupResort) || '리조트 로비';
                if (meetingPlace.includes('페어웨이')) meetingPlace = '페어웨이 정문게이트';
                return `<div class="guidance-box"><b>투어 미팅 시간 / 장소 : 09:00 / ${meetingPlace}</b>\n\n★★ 주의 사항 및 준비물 ★★\n\n*주의 사항 - 미팅시간에서 10분이상 늦으시면 노쇼처리되며, 별도 연락 없이 출발합니다. 이 경우 환불 및 일정 변경 불가하오니 꼭 미리 체크아웃과 룸체크를 진행하고 기다려주세요\n\n편한 물놀이 복장\n매너팁 1인 100페소 (성인, 소인 동일)\n튜빙 진행시 1인 350페소 준비해 주세요\n여권 정보면과 호텔 바우쳐 사진으로 폰에 저장(선택)\n그외 개인적으로 필요한 물품\n\n칼리보 공항 공항세 1인 784페소(공항 현지불 / 필수사항)\nBK라운지 샤워실 이용비용 1인 100페소(라운지 현지불)</div>`;
            } else {
                return `<div class="guidance-box"><b>투어 미팅 시간 / 장소 : 09:40 / 보라카이션 사무실</b>\n<a href="https://goo.gl/maps/pQkmCErHLjmQGRYM9" class="map-btn" target="_blank">📍 사무실 구글맵 확인</a>\n\n★★ 주의 사항 및 준비물 ★★\n\n*주의 사항 - 미팅시간에서 10분이상 늦으시면 노쇼처리되며, 별도 연락없이 출발합니다. 이 경우 환불 및 일정 변경 불가하오니 꼭 미팅시간을 지켜주세요\n\n편한 물놀이 복장, 비치타올1인 1장\n매너팁 1인 100페소 (성인, 소인 동일)\n튜빙 진행시 1인 350페소 준비해 주세요\n여권 정보면과 호텔 바우쳐 사진으로 폰에 저장(선택)\n그외 개인적으로 필요한 물품</div>`;
            }
        }
        // 5. 아이랜드/랜드투어
        if (name.includes('랜드투어') || name.includes('아이랜드')) {
            return `<div class="guidance-box"><b>투어 미팅 시간 / 장소 : 10:30 / 보라카이션 사무실</b>\n<a href="https://goo.gl/maps/pQkmCErHLjmQGRYM9" class="map-btn" target="_blank">📍 사무실 구글맵 확인</a>\n\n★ 준비물\n편한 복장\n매너팁 1인 100페소 (성인, 소인 동일)\n그외 개인적으로 필요한 물품</div>`;
        }
        // 6. 마사지 (에스파, 루나, 보라스파, 카바얀 등)
        if (name.includes('에스파') || name.includes('루나') || name.includes('보라스파') || name.includes('카바얀') || name.includes('힐롯') || name.includes('포세이돈') || name.includes('마리스') || name.includes('헬리오스')) {
            let meetingPlace = "";
            let mapLink = "";
            const lowerDetails = (item.details || "").toLowerCase();
            
            if (lowerDetails.includes('afh') || lowerDetails.includes('호핑 후')) {
                meetingPlace = "호핑투어 종료 후 마사지샵으로 바로 이동";
            } else if (lowerDetails.includes('afm') || lowerDetails.includes('말룸 후')) {
                meetingPlace = "말룸파티 종료 후 마사지샵으로 바로 이동";
            } else if (item.details && (item.details.includes('픽업') || item.details.includes('이동'))) {
                meetingPlace = item.details;
            } else {
                if (name.includes('에스파') || name.toLowerCase().includes('sspa')) {
                    mapLink = "https://maps.app.goo.gl/QbuPCqypyURVhth38";
                    meetingPlace = "에스파 마사지샵 개별이동";
                } else if (name.includes('루나')) {
                    mapLink = "https://maps.app.goo.gl/JYmbGcM6MrH5gHTBA";
                    meetingPlace = "루나스파 마사지샵 개별이동";
                } else if (name.includes('보라스파')) {
                    mapLink = "https://maps.app.goo.gl/tWBfSVDzmvGgJjRU8";
                    meetingPlace = "보라스파 마사지샵 개별이동";
                } else if (name.includes('카바얀')) {
                    mapLink = "https://maps.app.goo.gl/DsXg4tSonc5KsF4K6";
                    meetingPlace = "카바얀 마사지샵 개별이동";
                } else if (name.includes('포세이돈')) {
                    mapLink = "https://maps.app.goo.gl/9yGv7TzU1W7jE7N68";
                    meetingPlace = "포세이돈 마사지샵 개별이동";
                } else if (name.includes('마리스')) {
                    mapLink = "https://maps.app.goo.gl/r6fD7D5t7Y6J8rXm8";
                    meetingPlace = "마리스 마사지샵 개별이동";
                } else if (name.includes('헬리오스')) {
                    mapLink = "https://maps.app.goo.gl/v3VfR5k7X7J2N7Y6A";
                    meetingPlace = "헬리오스 마사지샵 개별이동";
                } else if (name.includes('힐롯')) {
                    meetingPlace = (item.time || '12:30') + " / 메인로드 졸리비";
                }
            }

            const mapBtn = mapLink ? `\n<a href="${mapLink}" class="map-btn" target="_blank">📍 마사지샵 위치 구글맵 확인</a>` : "";
            
            return `<div class="guidance-box"><b>투어 미팅 시간 / 장소 : ${meetingPlace}</b>${mapBtn}\n\n★ 준비물\n편한 복장\n매너팁 1인 100페소 (성인, 소인 동일)\n그외 개인적으로 필요한 물품</div>`;
        }
        // 7. 액티비티 (파라세일링, 다이빙, 프리다이빙, 헬멧다이빙 등)
        if (name.includes('파라세일링') || name.includes('다이빙') || name.includes('헬멧') || name.includes('어드벤처') || name.includes('제트스키')) {
            const meetingTime = item.time || "10:00";
            let meetingPlace = getKorResort(res.pickupResort) || "리조트 로비";
            if (meetingPlace.includes('페어웨이')) meetingPlace = '페어웨이 정문게이트';
            return `<div class="guidance-box"><b>투어 미팅 시간 / 장소 : ${meetingTime} / ${meetingPlace}</b>\n\n★ 준비물\n편한 물놀이 복장\n매너팁 1인 100페소 (성인, 소인 동일)\n그외 개인적으로 필요한 물품</div>`;
        }
        // 8. 골프
        if (name.includes('골프')) {
            const meetingTime = item.time || "07:40";
            let meetingPlace = getKorResort(res.pickupResort) || "헤난 샌드";
            if (meetingPlace.includes('페어웨이')) meetingPlace = '페어웨이 정문게이트';
            return `<div class="guidance-box"><b>투어 미팅 시간 / 장소 : ${meetingTime} / ${meetingPlace}</b>\n점심 포함 : 점보크랩\n\n★ 준비물\n편한 복장\n매너팁 1인 100페소 (성인, 소인 동일)\n그외 개인적으로 필요한 물품\n\n→ 불포함사항\n- 골프채, 골프공, 골프슈즈, 골프글로브\n- 개인음료(그늘집 있음)\n- 캐디팁 - 1인 100페소(18홀기준, 캐디에게 직접 페이)\n- 복귀 트라이시클비용(편도 약 150페소)</div>`;
        }
        // 9. VIP 라운지
        if (name.includes('라운지') || name.includes('VIP')) {
            return `<div class="guidance-box"><b>VIP 라운지 (공항 내부)</b>\nVIP 라운지는 공항 내부에 있는 라운지 입니다.\n라운지에 입장 하기 위해서는 공항 입장 후 모든 출국절차를 끝내시고 마지막 이민국까지 통과를 하시고 이용 하실 수 있습니다.\n출국절차 완료 후 2층 라운지 가셔서 성함말씀 혹은 이 예약문자 보여주시고 이용하시면 됩니다.\n*선착순 예약 특성상 예약과 동시에 자리가 배정이 됩니다. 출국수속이 지체되어 라운지 도착 후 이용시간이 예상했던 시간보다 부족하여도 또는 이용을 못하신다 하더라도 당일 취소 및 환불은 불가 합니다.</div>`;
        }

        return "";
    }

    async function loadVoucher() {
        const urlParams = new URLSearchParams(window.location.search);
        const resId = urlParams.get('id');
        const type = urlParams.get('type');
        const contact = urlParams.get('contact');
        
        if (!resId && !contact) return;
        try {
            let res = null;
            if (contact) {
                const q = query(collection(db, "reservations"), where("contact", "==", contact), where("status", "==", "예약확정"));
                const snap = await getDocs(q);
                if (!snap.empty) res = snap.docs[0].data();
            } else {
                const collectionName = (type === 'quick') ? "quick_vouchers" : "reservations";
                const docSnap = await getDoc(doc(db, collectionName, resId));
                if (docSnap.exists()) res = docSnap.data();
            }

            if (res) {
                const isQuick = (type === 'quick');
                const korName = res.customerKorName || '-';
                const engName = res.engName || '-';
                
                document.getElementById('v-name').innerText = isQuick ? korName : `${korName} (${engName})`;
                document.getElementById('v-agency').innerText = res.contact || '-';
                
                if (isQuick) {
                    document.getElementById('label-agency').innerText = '구매처';
                    document.getElementById('v-exchange').innerText = res.exchangeAmount || '-';
                    document.getElementById('v-pax').innerText = res.paxInfo || '-';
                } else {
                    document.getElementById('label-agency').innerText = '연락처';
                    document.getElementById('v-exchange').innerText = res.exchangeAmount || '-';
                    const totalPax = res.items && res.items[0] ? `${res.items[0].count}명` : '-';
                    document.getElementById('v-pax').innerText = totalPax;
                }

                let allItems = [];
                const rawItems = res.items || [];

                rawItems.forEach(item => {
                    const itemName = item.name || '';
                    if (itemName.includes('픽업샌딩') || itemName.includes('픽업') || itemName.includes('샌딩')) {
                        // 1. 공항 픽업 아이템 추가 (왕복 또는 픽업 포함 시)
                        if (itemName.includes('픽업샌딩') || itemName.includes('픽업') || itemName.toLowerCase().includes('meeting')) {
                            const pFlight = (res.pickupFlight || '').toUpperCase().trim();
                            allItems.push({
                                name: pFlight ? `✈️ 공항 픽업 (${pFlight})` : `✈️ 공항 픽업`,
                                date: item.pickupDate || res.pickupDate || item.date,
                                time: item.pickupTime || item.time || "14:00",
                                count: item.count,
                                details: item.details
                            });
                        }

                        // 2. 공항 샌딩 아이템 추가 (왕복 또는 샌딩 포함 시)
                        if (itemName.includes('픽업샌딩') || itemName.includes('샌딩') || itemName.toLowerCase().includes('sending')) {
                            // 📍 공항 샌딩 시간 규칙 적용
                            let flight = (res.sendingFlight || item.flight || '').toUpperCase().trim();
                            let sandingTime = res.sendingTime || item.time;

                            // 숫자가 아닌 시간(이미 전날 재안내 등)이거나 수동 입력값이 없을 때만 자동 계산
                            if (!sandingTime || sandingTime.includes(':')) {
                                if (flight === 'TW126') {
                                    sandingTime = isStation10(res.sendingResort || res.pickupResort) ? "08:10" : "08:30";
                                } else if (flight.startsWith('TW') || flight.startsWith('5J') || flight.startsWith('Z2') || flight.startsWith('DG') || (flight.startsWith('PR') && !['PR469', 'PR489'].includes(flight))) {
                                    // ✈️ 국내선 또는 사용자 지정 항공편 (샌딩 시간 전날 재안내)
                                    sandingTime = "전날 재안내";
                                } else if (flight) {
                                    sandingTime = "21:00"; // 기타 국제선 기본값
                                }
                            }

                            allItems.push({
                                name: flight ? `✈️ 공항 샌딩 (${flight})` : `✈️ 공항 샌딩`,
                                date: item.sendingDate || res.sendingDate || item.date,
                                time: sandingTime,
                                count: item.count,
                                details: item.details
                            });
                        }

                    } else {
                        allItems.push(item);
                    }
                });
                allItems.sort((a, b) => (a.date || "").localeCompare(b.date || "") || (a.time || "00:00").localeCompare(b.time || "00:00"));

                const list = document.getElementById('item-list');
                list.innerHTML = allItems.map(item => {
                    const isPickupSending = item.name.includes('픽업') || item.name.includes('샌딩');
                    
                    // 🏷️ 상품명 한글 변환 로직 추가
                    let displayName = item.name;
                    if (displayName.toLowerCase().includes('malum') || displayName.includes('말룸파티')) {
                        displayName = "시크릿가든 말룸파티";
                    }

                    return `
                    <div class="item-card">
                        <div class="item-header">
                            <div class="item-name">${displayName}</div>
                            <div class="item-status">확정</div>
                        </div>
                        <div class="item-details">
                            <div class="detail-point"><span class="material-icons">calendar_today</span><b>날짜</b>${item.date || '-'}</div>
                            ${(!isPickupSending && item.time && item.time.trim()) ? `<div class="detail-point"><span class="material-icons">access_time</span><b>시간</b>${item.time}</div>` : ''}
                            <div class="detail-point"><span class="material-icons">people</span><b>인원</b>${item.count || '-'}명</div>
                        </div>
                        ${getTourGuidance(item.name, item, res)}
                    </div>
                `;}).join('');
                document.getElementById('loading').style.display = 'none';
            }
        } catch (e) { console.error(e); }
    }
    loadVoucher();
</script>
