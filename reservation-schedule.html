<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="boholsean-logo.png">
    <link rel="apple-touch-icon" href="boholsean-logo.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>예약 확인서 - Bohol Sean</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00b48a; --bg: #f4f7f6; --text: #333; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--text); line-height: 1.6; }
        .voucher-container { max-width: 600px; margin: 0 auto; }
        
        .header { text-align: center; padding: 30px 0; }
        .header img { width: 120px; margin-bottom: 10px; }
        .header h1 { margin: 0; font-size: 24px; font-weight: 900; color: var(--primary); letter-spacing: -0.5px; }
        
        .card { background: #fff; border-radius: 20px; padding: 25px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .section-title { font-size: 17px; font-weight: 800; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; color: #111; }
        .section-title .material-icons { color: var(--primary); font-size: 20px; }

        .info-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; }
        .info-row label { color: #888; font-weight: 600; }
        .info-row span { font-weight: 700; color: #111; }

        .schedule-item-wrapper { border-bottom: 1px solid #f0f0f0; padding-bottom: 20px; margin-bottom: 20px; }
        .schedule-item-wrapper:last-child { border-bottom: none; }
        
        .schedule-item { display: flex; align-items: center; gap: 15px; padding: 10px 0; }
        .date-box { text-align: center; min-width: 50px; }
        .date-box .month { display: block; font-size: 11px; font-weight: 700; color: var(--primary); text-transform: uppercase; }
        .date-box .day { display: block; font-size: 18px; font-weight: 800; color: #111; line-height: 1; }
        .item-info { flex: 1; }
        .item-info .name { display: block; font-size: 15px; font-weight: 800; color: #111; }
        .item-info .time { display: block; font-size: 12px; color: #666; font-weight: 600; }
        .item-pax { font-size: 13px; font-weight: 700; color: var(--primary); background: #e6f7f3; padding: 4px 10px; border-radius: 10px; }

        .guide-box { background: #f8faf9; border-radius: 15px; padding: 15px; margin-top: 10px; font-size: 13px; color: #555; white-space: pre-wrap; line-height: 1.7; }
        .guide-box b { color: #111; display: block; margin-bottom: 5px; font-size: 14px; }
        
        .notice-box { background: #fff8e6; border-radius: 20px; padding: 20px; border: 1px solid #ffeeba; margin-top: 20px; font-size: 13px; color: #856404; }
        .notice-box b { display: block; margin-bottom: 5px; }

        .print-btn { position: fixed; bottom: 20px; right: 20px; background: #333; color: #fff; border: none; padding: 12px 25px; border-radius: 50px; font-weight: 800; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 1000; }

        @media print {
            body { padding: 0; background: #fff; }
            .print-btn { display: none; }
            .voucher-container { max-width: 100%; }
        }
    </style>
</head>

<div class="voucher-container">
    <div class="header">
        <img src="boholsean-logo.png" alt="Bohol Sean">
        <h1>BOHOL SEAN</h1>
    </div>

    <!-- 예약자 정보 -->
    <div class="card">
        <div class="section-title"><span class="material-icons">person</span>예약 정보</div>

        <div id="schedule-list">
            <div id="loading" style="text-align:center; padding:20px; color:#999; font-size:13px;">데이터를 불러오는 중...</div>
        </div>
    </div>

    <div class="notice-box">
        <b>안내 및 유의사항</b>
        • 모든 일정은 현지 기상 상황 및 업체 사정에 의해 변경될 수 있습니다.<br>
        • 미팅 시간 10분 전까지 약속 장소에서 대기해 주시기 바랍니다.<br>
        • 문의 사항은 보홀션 카카오톡 채널을 이용해 주세요.
    </div>
</div>

<button class="print-btn" onclick="window.print()">인쇄하기</button>

    function translateResort(name) {

        return name;

    function getTemplateKey(name) {
        const n = name.toLowerCase();
        if (n.includes('파밀라칸')) return 'pamilacan';
        if (n.includes('오슬롭') || n.includes('고래상어')) return 'oslob';
        if (n.includes('낚시')) return 'fishing';
        if (n.includes('육상') && n.includes('d')) return 'landD';
        if (n.includes('육상') && n.includes('c')) return 'landC';
        if (n.includes('시크릿')) return 'secret';
        if (n.includes('샤인') && n.includes('호핑')) return 'shineHopping';
        if (n.includes('단독') || n.includes('프라이빗')) return 'privateHopping';
        if (n.includes('나팔링')) return 'napaling';
        if (n.includes('힐롯')) return 'hilot';
        if (n.includes('반딧불')) return 'firefly';
        if (n.includes('선반팩') || n.includes('노스젠')) return 'sunsetPack';
        if (n.includes('보홀쇼')) return 'boholShow';
        if (n.includes('왕복') || (n.includes('픽업') && n.includes('드랍'))) return 'round';
        if (n.includes('픽업') || n.includes('공항 픽업')) return 'pickup';
        if (n.includes('드랍') || n.includes('공항 드랍') || n.includes('샌딩')) return 'drop';
        if (n.includes('항구')) return 'port';
        return null;
    }

    async function loadVoucher() {
        const urlParams = new URLSearchParams(window.location.search);
        const contact = urlParams.get('contact');
        const resId = urlParams.get('id');
        
        if (!contact && !resId) return;

        try {
            let resData = null;
            if (contact) {
                const q = query(collection(db, "reservations"), where("contact", "==", contact), where("status", "==", "예약확정"));
                const snap = await getDocs(q);
                if (!snap.empty) resData = snap.docs[0].data();
            } else {
                const docSnap = await getDoc(doc(db, "reservations", resId));
                if (docSnap.exists()) resData = docSnap.data();
            }

            if (resData) {
                document.getElementById('v-name').innerText = resData.customerKorName || '-';
                document.getElementById('v-contact').innerText = resData.contact || '-';
                document.getElementById('v-pax').innerText = resData.paxInfo || (resData.items?.[0]?.count ? resData.items[0].count + '명' : '-');
                document.getElementById('v-exchange').innerText = resData.exchangeAmount || '전액 결제 완료';

                const items = resData.items || [];
                items.sort((a, b) => (a.date || "").localeCompare(b.date || "") || (a.time || "00:00").localeCompare(b.time || "00:00"));

                const scheduleList = document.getElementById('schedule-list');
                let html = '';

                items.forEach(item => {
                    const month = item.date ? item.date.split('-')[1] : '--';
                    const day = item.date ? item.date.split('-')[2] : '--';
                    
                    // 가이드 내용 생성
                    const key = getTemplateKey(item.name);
                    let guideHtml = '';
                    if (key) {
                        const template = TOUR_TEMPLATES[key];
                        const guideContent = template.content
                            .replace('[NAME]', resData.customerKorName)
                            .replace('[PAX]', item.count + '명')
                            .replace('[TIME]', item.time || '전날 재인폼')
                            .replace('[MEETING]', translateResort(resData.pickupResort || '헤난 알로나 로비'))
                            .replace('[DROP]', translateResort(resData.sendingResort || resData.pickupResort || '헤난 알로나 로비'));
                        
                        guideHtml = `
                            <div class="guide-box">
                                <b>${item.name} 안내</b>${guideContent}
                            </div>
                        `;
                    }

                    html += `
                        <div class="schedule-item-wrapper">
                            <div class="schedule-item">
                                <div class="date-box">
                                    <span class="month">${month}월</span>
                                    <span class="day">${day}</span>
                                </div>
                                <div class="item-info">
                                    <span class="name">${item.name}</span>
                                    <span class="time">${item.time || '전날 재인폼'}</span>
                                </div>
                                <div class="item-pax">${item.count}명</div>
                            </div>
                            ${guideHtml}
                        </div>
                    `;
                });

                scheduleList.innerHTML = html;
                document.getElementById('loading').style.display = 'none';
            }
        } catch (e) { console.error(e); }
    }

    loadVoucher();
